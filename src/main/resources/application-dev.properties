spring.datasource.url=jdbc:mysql://localhost:3306/study_manager_dev?useSSL=false&serverTimezone=Europe/Riga&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secret=dev-secret-key-change-in-production-must-be-at-least-256-bits-long
jwt.expiration-ms=900000
jwt.refresh-expiration-ms=604800000

# File uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.lv.studymanager=DEBUG
logging.level.org.springframework.security=DEBUG
